<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stockeye</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Improved API call with better error handling
        async function fetchData() {
            try {
                const response = await fetch('https://api.stockeye.com/data');
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                // Caching data in localStorage
                localStorage.setItem('stockData', JSON.stringify(data));
                renderChart(data);
            } catch (error) {
                console.error('Fetch error:', error);
                const cachedData = localStorage.getItem('stockData');
                if (cachedData) {
                    console.log('Using cached data.');
                    renderChart(JSON.parse(cachedData));
                }
            }
        }

        // Optimized chart rendering
        function renderChart(data) {
            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Stock Prices',
                        data: data.prices,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        fill: false,
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { beginAtZero: true },
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // Calling the function to fetch data
        fetchData();
    </script>
</head>
<body>
    <h1>Stockeye Dashboard</h1>
    <canvas id="myChart" width="400" height="200"></canvas>
</body>
</html>
