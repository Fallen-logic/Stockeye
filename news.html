<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewsEye</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #22222f;
    --accent: #e8c547;
    --text: #e8e8ee;
    --muted: #55556a;
    --red: #ff4d6d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grain overlay */
  body::after {
    content:'';
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px;
    z-index:999;
  }

  .masthead {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(12,12,15,.97);
    backdrop-filter: blur(20px);
    z-index: 10;
  }
  .masthead-left {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -.5px;
  }
  .logo span { color: var(--accent); font-style: italic; }
  .source-tag {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 3px;
  }
  .updated {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Sans', monospace;
  }
  .refresh-btn {
    background: rgba(232,197,71,.1);
    border: 1px solid rgba(232,197,71,.3);
    color: var(--accent);
    padding: 5px 12px;
    border-radius: 5px;
    font-size: 10px;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .5px;
  }
  .refresh-btn:hover { background: rgba(232,197,71,.2); }
  .refresh-btn:disabled { opacity: .4; cursor: not-allowed; }

  .cats {
    display: flex;
    gap: 2px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--bg);
    position: sticky;
    top: 57px;
    z-index: 9;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .5px;
    padding: 6px 14px;
    border-radius: 5px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .cat-btn:hover { color: var(--text); background: var(--surface); }
  .cat-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }

  .feed {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px 40px;
  }

  /* Featured first article */
  .featured {
    border-bottom: 1px solid var(--border);
    padding: 28px 0 24px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .featured:hover { opacity: .85; }
  .featured-tag {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .featured-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -.3px;
    margin-bottom: 10px;
  }
  .featured-desc {
    font-size: 14px;
    color: #9999b0;
    line-height: 1.6;
    max-width: 640px;
  }
  .featured-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 12px;
    letter-spacing: .3px;
  }

  /* Article list */
  .articles { display: flex; flex-direction: column; }
  .article {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 16px;
    align-items: start;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all .15s;
    text-decoration: none;
    color: inherit;
  }
  .article:hover .art-title { color: var(--text); font-size: 15px; font-weight: 600; line-height: 1.4; }
  .article:hover .art-title { color: var(--accent); }
  .art-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px; gap: 10px;
  }
  .art-body { flex: 1; min-width: 0; }
  .sum-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    background: rgba(255,200,0,0.1); border: 1px solid rgba(255,200,0,0.4);
    color: #ffc800; font-size: 11px; font-family: 'Space Mono', monospace;
    cursor: pointer; letter-spacing: 0.08em; transition: all 0.2s;
    text-decoration: none; white-space: nowrap;
  }
  .sum-btn:hover { background: rgba(255,200,0,0.2); border-color: #ffc800; }
  .sum-modal {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .sum-modal.open { display: flex; }
  .sum-box {
    background: #141414; border: 1px solid #2a2a2a; border-radius: 14px;
    padding: 28px; max-width: 560px; width: 90%; max-height: 80vh;
    overflow-y: auto; position: relative;
  }
  .sum-box h3 { color: #ffc800; font-size: 13px; letter-spacing: 0.1em; margin: 0 0 14px; }
  .sum-box .sum-content { color: #ccc; font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
  .sum-close {
    position: absolute; top: 14px; right: 16px; cursor: pointer;
    color: #555; font-size: 18px; line-height: 1;
  }
  .sum-close:hover { color: #fff; }
  .sum-loader { color: #555; font-size: 12px; font-family: 'Space Mono', monospace; }
  .art-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    transition: color .15s;
    margin-bottom: 5px;
  }
  .art-desc {
    font-size: 12px;
    color: #66667a;
    line-height: 1.5;
  }

  /* Skeleton screens */
  @keyframes shimmer {
    0% { background-position: -600px 0; }
    100% { background-position: 600px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 600px 100%;
    animation: shimmer 1.4s infinite linear;
    border-radius: 4px;
  }
  .skel-featured {
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .skel-tag   { height: 10px; width: 80px; }
  .skel-title { height: 28px; width: 90%; border-radius: 4px; }
  .skel-title-sm { height: 28px; width: 65%; border-radius: 4px; }
  .skel-desc  { height: 14px; width: 70%; }
  .skel-desc2 { height: 14px; width: 50%; }
  .skel-meta  { height: 10px; width: 100px; }
  .skel-article {
    display: grid;
    grid-template-columns: 1fr 72px;
    gap: 16px;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
  }
  .skel-article-left { display: flex; flex-direction: column; gap: 8px; }
  .skel-thumb { width: 72px; height: 56px; border-radius: 6px; flex-shrink: 0; }

  /* Thumbnails */
  .art-thumb {
    width: 80px;
    height: 64px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .art-thumb-placeholder {
    width: 72px;
    height: 56px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .featured-thumb {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 14px;
    background: var(--surface2);
  }
  .featured-thumb-placeholder {
    width: 100%;
    height: 120px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin-bottom: 14px;
    color: var(--muted);
  }

  /* Article source + time */
  .art-byline {
    font-size: 10px;
    color: #888;
    margin-top: 5px;
    letter-spacing: .2px;
  }
  .art-byline span { color: var(--muted); }

  /* Loading / error */
  .state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 12px;
    color: var(--muted);
  }
  .state-text { font-size: 12px; letter-spacing: .5px; }

  @media(max-width:600px) {
    .featured-title { font-size: 20px; }
    .masthead { padding: 12px 16px; }
    .feed { padding: 0 16px 40px; }
    .cats { padding: 8px 16px; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-left">
    <div class="logo">News<span>Eye</span></div>
    <div class="source-tag">Livemint</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="updated" id="ts">—</div>
    <button class="refresh-btn" id="rfbtn" onclick="load()">↺ REFRESH</button>
  </div>
</div>

<div class="cats" id="catBar">
  <!-- populated by JS -->
</div>

<div class="feed" id="feed">
  <div id="skeletons"></div>
</div>

<script>
const API = "https://stockeye.onrender.com";
const CATS = ["News","Markets","Companies","Economy","Tech","Money"];
let active = "News";

function timeSince(ts) {
  if(!ts) return '';
  const diff = Math.floor((Date.now()/1000 - ts));
  if(diff < 60) return 'just now';
  if(diff < 3600) return Math.floor(diff/60) + 'm ago';
  if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function renderCats() {
  document.getElementById('catBar').innerHTML = CATS.map(c =>
    `<button class="cat-btn ${c===active?'active':''}" onclick="pick('${c}')">${c}</button>`
  ).join('');
}

const CAT_ICONS = {
  'News':'📰','Markets':'📈','Companies':'🏢',
  'Economy':'🏦','Tech':'💻','Money':'💰'
};

function getCatIcon(cat){ return CAT_ICONS[cat] || '📰'; }

function renderFeed(articles) {
  if(!articles.length) {
    document.getElementById('feed').innerHTML = '<div class="state"><div class="state-text">NO ARTICLES FOUND</div></div>';
    return;
  }
  const [first, ...rest] = articles;

  const featThumb = first.image
    ? `<img class="featured-thumb" src="${first.image}" alt="" onerror="this.style.display='none'">`
    : `<div class="featured-thumb-placeholder">${getCatIcon(active)}</div>`;

  const featured = `
    <div class="featured" onclick="window.open('${first.link}','_blank')">
      <div class="featured-tag">✦ Livemint</div>
      ${featThumb}
      <div class="featured-title">${first.title}</div>
      ${first.desc ? `<div class="featured-desc">${first.desc}…</div>` : ''}
      <div class="art-byline">Livemint · <span>${timeSince(first.ts)}</span></div>
      <button class="sum-btn" onclick="event.stopPropagation();summarize(${JSON.stringify(first.title)},${JSON.stringify(first.desc||'')},${JSON.stringify(first.link)})">✦ AI SUMMARY</button>
    </div>`;

  const list = rest.map((a,i) => {
    const thumb = a.image
      ? `<img class="art-thumb" src="${a.image}" alt="" onerror="this.style.display='none'">`
      : ``;
    const titleJson = JSON.stringify(a.title);
    const descJson  = JSON.stringify(a.desc||'');
    const linkJson  = JSON.stringify(a.link);
    return `
    <div class="article" onclick="window.open('${a.link}','_blank')">
      ${thumb}
      <div class="art-body">
        <div class="art-title">${a.title}</div>
        ${a.desc ? `<div class="art-desc">${a.desc}…</div>` : ''}
        <div class="art-footer">
          <span class="art-byline">Livemint &middot; ${timeSince(a.ts)}</span>
          <button class="sum-btn" onclick="event.stopPropagation();summarize(${titleJson},${descJson},${linkJson})">&#10022; AI SUMMARY</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('feed').innerHTML = featured + `<div class="articles">${list}</div>`;
}

function showSkeletons(){
  const skels = Array.from({length:5},(_,i) => i===0
    ? `<div class="skel-featured">
        <div class="skeleton skel-tag"></div>
        <div class="skeleton skel-title"></div>
        <div class="skeleton skel-title-sm"></div>
        <div class="skeleton skel-desc"></div>
        <div class="skeleton skel-meta"></div>
       </div>`
    : `<div class="skel-article">
        <div class="skel-article-left">
          <div class="skeleton skel-title" style="width:${85-i*5}%"></div>
          <div class="skeleton skel-desc"></div>
          <div class="skeleton skel-meta"></div>
        </div>
        <div class="skeleton skel-thumb"></div>
       </div>`
  ).join('');
  document.getElementById('feed').innerHTML = skels;
}

async function load() {
  const btn = document.getElementById('rfbtn');
  btn.disabled = true; btn.textContent = '↺ LOADING';
  document.getElementById('feed').innerHTML = '<div id="skeletons"></div>';
  try {
    const r = await fetch(`${API}/news?cat=${encodeURIComponent(active)}`);
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    renderFeed(data.articles || []);
    document.getElementById('ts').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) + ' IST';
  } catch(e) {
    document.getElementById('feed').innerHTML = `<div class="state"><div class="state-text">⚠ Could not load feed: ${e.message}</div></div>`;
  }
  btn.disabled = false; btn.textContent = '↺ REFRESH';
}

function pick(cat) {
  active = cat;
  renderCats();
  load();
}

renderCats();
load();
setInterval(load, 10*60*1000); // refresh every 10 mins

async function summarize(title, desc, link) {
  document.getElementById('sumModal').classList.add('open');
  document.getElementById('sumContent').innerHTML = '<span class="sum-loader">✦ Analysing article...</span>';
  try {
    const res = await fetch('https://stockeye.onrender.com/summarize', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({title, desc, link})
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    document.getElementById('sumContent').textContent = data.summary;
  } catch(e) {
    document.getElementById('sumContent').textContent = 'Failed to summarize: ' + e.message;
  }
}
function closeSum() {
  document.getElementById('sumModal').classList.remove('open');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeSum(); });

</script>
  <!-- Summary Modal -->
  <div class="sum-modal" id="sumModal">
    <div class="sum-box">
      <div class="sum-close" onclick="closeSum()">✕</div>
      <h3>✦ AI SUMMARY</h3>
      <div class="sum-content" id="sumContent"><span class="sum-loader">Analysing article...</span></div>
    </div>
  </div>
</body>
</html>
